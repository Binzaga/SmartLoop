name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint + Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check API
        working-directory: apps/api
        run: bunx tsc --noEmit

      - name: Type check Web
        working-directory: apps/web
        run: bunx tsc --noEmit

      - name: Build SDK
        working-directory: packages/sdk-node
        run: bun run build || echo "(no build step)"

  api-smoke:
    name: API boot smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartloop
          POSTGRES_PASSWORD: smartloop_ci_pass
          POSTGRES_DB: smartloop
        options: >-
          --health-cmd "pg_isready -U smartloop -d smartloop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://smartloop:smartloop_ci_pass@localhost:5432/smartloop
        run: bun run db:migrate

      - name: Smoke-boot API
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://smartloop:smartloop_ci_pass@localhost:5432/smartloop
          ADMIN_TOKEN: ci-token-must-be-at-least-16-chars
          LOG_LEVEL: warn
          API_PORT: 8088
        run: |
          bun run src/server.ts &
          API_PID=$!
          # wait for healthz
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8088/healthz > /dev/null; then
              echo "API up"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8088/readyz | tee /dev/stderr
          kill $API_PID || true

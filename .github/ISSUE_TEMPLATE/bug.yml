name: 🐛 Bug Report
description: Something is broken or behaving unexpectedly.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please fill in as much as you can — it helps us reproduce and fix faster.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I did X, Y happened instead of Z.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Z should have happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SmartLoop version / commit
      placeholder: "v0.1.0 or commit sha"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running SmartLoop?
      options:
        - Self-hosted (docker compose)
        - Self-hosted (bare metal / bun)
        - Cloud (hosted)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: |
        Paste relevant API logs (`/tmp/smartloop-api.log`), browser console, or screenshots.
        Redact any secrets before pasting.
      render: shell
  - type: input
    id: contact
    attributes:
      label: Contact (optional)
      description: Email or handle so we can follow up if needed.
